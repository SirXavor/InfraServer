apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: provisioning
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SirXavor/InfraServer.git
    targetRevision: main
    path: manifests/infraserver/provisioning
  destination:
    server: https://kubernetes.default.svc
    namespace: provisioning
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
