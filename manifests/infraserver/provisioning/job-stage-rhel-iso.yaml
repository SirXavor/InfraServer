apiVersion: batch/v1
kind: Job
metadata:
  name: stage-rhel-iso
  namespace: provisioning
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: stage-rhel-iso
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              SRC="/seed/rhel-9.iso"
              DST_DIR="/content/rhel/9"
              DST="${DST_DIR}/rhel-9.iso"

              if [ ! -f "$SRC" ]; then
                echo "ERROR: no existe $SRC"
                exit 1
              fi

              mkdir -p "$DST_DIR"

              if [ -f "$DST" ]; then
                echo "La ISO ya existe en el PVC: $DST"
                exit 0
              fi

              echo "Copiando ISO de RHEL al PVC..."
              cp "$SRC" "$DST"

              echo "ISO copiada correctamente en $DST"
          volumeMounts:
            - name: seed-rhel
              mountPath: /seed
              readOnly: true
            - name: provisioning-content
              mountPath: /content
      volumes:
        - name: seed-rhel
          hostPath:
            path: /opt/infraserver-seed/rhel
            type: Directory
        - name: provisioning-content
          persistentVolumeClaim:
            claimName: provisioning-content