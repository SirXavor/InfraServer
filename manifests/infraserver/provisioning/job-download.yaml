apiVersion: batch/v1
kind: Job
metadata:
  name: download-ubuntu-iso
  namespace: provisioning
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              set -e

              mkdir -p /content/ubuntu
              TARGET="/content/ubuntu/ubuntu-24.04.4-live-server-amd64.iso"

              if [ -f "$TARGET" ]; then
                echo "ISO ya existe, nada que hacer."
                exit 0
              fi

              echo "Descargando ISO de Ubuntu..."
              curl -L --retry 5 --retry-delay 10 \
                -o "$TARGET" \
                https://releases.ubuntu.com/24.04/ubuntu-24.04.4-live-server-amd64.iso

              echo "Descarga completada."
          volumeMounts:
            - name: provisioning-content
              mountPath: /content
      volumes:
        - name: provisioning-content
          persistentVolumeClaim:
            claimName: provisioning-content