apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawriter-frontend
  namespace: infrawriter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrawriter-frontend
  template:
    metadata:
      labels:
        app: infrawriter-frontend
    spec:
      containers:
        - name: frontend
          image: xavor/infrawriter:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi