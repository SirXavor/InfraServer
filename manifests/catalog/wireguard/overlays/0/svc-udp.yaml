apiVersion: v1
kind: Service
metadata:
  name: wg-udp
  namespace: wireguard
  annotations:
    metallb.universe.tf/allow-shared-ip: wireguard-shared
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.70
  selector:
    app: wg-0
  ports:
    - name: wireguard
      protocol: UDP
      port: 51818
      targetPort: 51818
