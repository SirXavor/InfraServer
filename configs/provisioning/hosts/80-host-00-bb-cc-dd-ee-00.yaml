      - name: admin.c3s
        password: "$6$rPp1eCmX8PAkQz.9$BbbKexET59FkgsQDZMjUl46d4pu1mOp40fbpuiZETuRA.f6KVVYajxQCS6xPDRQAhJ7Bg/WXfihjmEyBOmRSw/"
        groups: [wheel]
        shell: /bin/bash

    network:
      provisioning:
        interface: p1p1
        route_metric: 500
        autoconnect: true

      bond:
        name: bond0
        interfaces: [em1, em2]
        mode: 802.3ad
        options:
          miimon: 100
          updelay: 200
          downdelay: 200
          lacp_rate: fast
          xmit_hash_policy: layer3+4

      bridges:
        - name: br-admin
          ip4: 172.16.10.19/24
          dns4: [172.16.10.10, 1.1.1.1]
          method: manual
          stp: false

        - name: br-srv
          method: disabled
          stp: false

      vlans:
        - id: 10
          name: vlan10
          parent: bond0
          bridge: br-admin

        - id: 20
          name: vlan20
          parent: bond0
          bridge: br-srv

        - id: 30
          name: vlan30
          parent: bond0
          ip4: 172.16.30.19/24

        - id: 40
          name: vlan40
          parent: bond0
          ip4: 172.16.40.19/24

        - id: 99
          name: vlan99
          parent: bond0
          ip4: 192.168.99.19/24
          gateway4: 192.168.99.1
          dns4: [1.1.1.1, 8.8.8.8]
          default_route: true
          route_metric: 100