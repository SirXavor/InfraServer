kind: base
name: automation

autoinstall:
  version: 1

  late-commands:
    - |
      curtin in-target --target=/target -- bash -c '
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y git ansible curl python3 python3-apt ca-certificates
      '

    - |
      curtin in-target --target=/target -- bash -c '
      mkdir -p /etc/infraserver /var/log/infraserver
      cat > /etc/infraserver/bootstrap.env << "EOF"
      DS_URL="http://192.168.1.70:8081"
      CFG_DIR="/etc/infraserver"
      REPO_URL="https://github.com/SirXavor/InfraServer.git"
      REPO_DIR="/opt/InfraServer"
      EOF
      chmod 600 /etc/infraserver/bootstrap.env
      '

    - |
      curtin in-target --target=/target -- bash -c '
      source /etc/infraserver/bootstrap.env
      if [ ! -d "$REPO_DIR/.git" ]; then
        git clone "$REPO_URL" "$REPO_DIR"
      fi
      '

    - |
      curtin in-target --target=/target -- bash -c 'cat > /usr/local/sbin/ansible-sync.sh << "EOF"
      #!/bin/bash
      set -euo pipefail

      source /etc/infraserver/bootstrap.env

      LOG_FILE="/var/log/infraserver/ansible-sync.log"

      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio ansible-sync ====="

      mkdir -p "$CFG_DIR"

      echo "[1/4] Detectando MAC..."
      MAC=$(ip link show | awk "/link\\/ether/ {print \$2; exit}" | tr ":" "-")
      echo "MAC detectada: $MAC"

      echo "[2/4] Descargando variables del host..."
      curl -fsSL "${DS_URL}/ds/${MAC}/ansible" -o "$CFG_DIR/ansible.yml"

      echo "[3/4] Sincronizando repositorio..."
      if [ ! -d "$REPO_DIR/.git" ]; then
        git clone "$REPO_URL" "$REPO_DIR"
      else
        git -C "$REPO_DIR" pull --ff-only
      fi

      echo "[4/4] Ejecutando playbook..."
      cd "$REPO_DIR/configs/ansible"
      ansible-playbook -i localhost, -c local playbooks/bootstrap.yaml -e @"$CFG_DIR/ansible.yml"

      echo "===== $(date) :: fin ansible-sync ====="
      EOF
      chmod 755 /usr/local/sbin/ansible-sync.sh'

    - |
      curtin in-target --target=/target -- bash -c 'cat > /etc/systemd/system/ansible-sync.service << "EOF"
      [Unit]
      Description=InfraServer Ansible Sync
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/ansible-sync.sh
      EOF'

    - |
      curtin in-target --target=/target -- bash -c 'cat > /etc/systemd/system/ansible-sync.timer << "EOF"
      [Unit]
      Description=Run InfraServer Ansible Sync periodically

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target
      EOF'

    - curtin in-target --target=/target -- systemctl daemon-reload
    - curtin in-target --target=/target -- systemctl enable ansible-sync.timer