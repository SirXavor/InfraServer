kind: base
name: package-installer

autoinstall:
  version: 1

  user-data:
    write_files:
      - path: /usr/local/sbin/infraserver-install-packages.sh
        owner: root:root
        permissions: '0755'
        content: |
          #!/bin/bash
          set -euxo pipefail

          LOG_FILE="/var/log/infraserver-package-install.log"
          REPO_HOST="192.168.1.70"
          PACKAGES=(
            ansible
            jq
            dracut
            clevis
            clevis-luks
            clevis-tpm2
            clevis-dracut
            tpm2-tools
            cryptsetup
            cryptsetup-initramfs
            lvm2
          )

          exec > >(tee -a "$LOG_FILE") 2>&1

          echo "===== $(date) :: inicio package-installer ====="

          echo "[1/3] Esperando conectividad de red..."
          NETWORK_OK=0
          for i in $(seq 1 30); do
            if ping -c1 "$REPO_HOST" >/dev/null 2>&1; then
              echo "Red OK"
              NETWORK_OK=1
              break
            fi
            echo "Intento $i/30: red aun no disponible"
            sleep 5
          done

          if [ "$NETWORK_OK" -ne 1 ]; then
            echo "ERROR: no hay conectividad con $REPO_HOST"
            exit 1
          fi

          export DEBIAN_FRONTEND=noninteractive

          echo "[2/3] apt-get update..."
          apt-get update

          echo "[3/3] Instalando paquetes centralizados..."
          apt-get install -y "${PACKAGES[@]}"

          echo "===== $(date) :: fin package-installer ====="