- name: Instalar script de ejecución de Ansible
  copy:
    dest: /usr/local/sbin/infraserver-apply.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      LOG_FILE="/var/log/infraserver/apply.log"
      CFG_DIR="/etc/infraserver"
      REPO_DIR="{{ automation.repo.local_path | default('/opt/InfraServer') }}"
      PLAYBOOK="{{ automation.apply.playbook | default('playbooks/bootstrap.yaml') }}"
      DS_URL="{{ automation.ds.url | default('http://192.168.1.70:8081') }}"

      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio apply ====="

      mkdir -p "$CFG_DIR"

      echo "[1/4] Detectando MAC..."
      MAC=$(ip link show | awk '/link\/ether/ {print $2; exit}' | tr ':' '-')
      echo "MAC: $MAC"

      echo "[2/4] Descargando configuración del host..."
      curl -fsSL "${DS_URL}/ds/${MAC}/ansible" -o "$CFG_DIR/ansible.yml"

      echo "[3/4] Ejecutando playbook..."
      cd "$REPO_DIR/configs/ansible"
      ansible-playbook -i localhost, -c local "$PLAYBOOK" -e @"$CFG_DIR/ansible.yml"

      echo "===== $(date) :: fin apply ====="

- name: Instalar servicio systemd de ejecución de Ansible
  copy:
    dest: /etc/systemd/system/infraserver-apply.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=InfraServer Apply Configuration
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/infraserver-apply.sh

- name: Instalar timer systemd de ejecución de Ansible
  copy:
    dest: /etc/systemd/system/infraserver-apply.timer
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Run InfraServer Apply periodically

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec={{ automation.apply.interval | default('1h') }}
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Recargar systemd
  systemd:
    daemon_reload: true

- name: Habilitar y arrancar timer de apply
  systemd:
    name: infraserver-apply.timer
    enabled: true
    state: started