apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-proxy-config
  namespace: dnsmasq
data:
  dnsmasq.conf: |
    port=0
    log-dhcp
    log-facility=-

    # Modo proxy: no asigna IPs, solo opciones PXE
    dhcp-range=192.168.1.0,proxy

    # ── Prioridad 1: iPXE ya está corriendo ──────────────────────────────
    # Detectar la segunda pasada de iPXE y darle el script HTTP directamente
    dhcp-userclass=set:ipxe,iPXE
    dhcp-boot=tag:ipxe,http://192.168.1.70/ipxe/menu.ipxe

    # ── Prioridad 2: arranque inicial, detectar arquitectura ─────────────
    dhcp-match=set:efi-x86_64,option:client-arch,7
    dhcp-boot=tag:efi-x86_64,ipxe.efi,,192.168.1.70
    dhcp-boot=tag:!efi-x86_64,undionly.kpxe,,192.168.1.70

    # next-server explícito (redundante con lo anterior, pero no hace daño)
    dhcp-option=option:tftp-server,192.168.1.70

    interface=enp2s0
    bind-interfaces
