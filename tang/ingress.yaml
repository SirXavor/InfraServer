apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tang
  namespace: tang
spec:
  ingressClassName: nginx
  rules:
    - host: tang.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tang
                port:
                  number: 80
