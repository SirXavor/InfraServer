resources:
  - namespace.yaml
  - kernel/deployment-kernel.yaml
  - kernel/service-kernel.yaml
  - kernel/ingress.yaml
  - tftp/deployment-tftp.yaml

configMapGenerator:
  - name: provisioning-configs
    namespace: provisioning
    files:
      - kernel/configs/default.yaml
      - kernel/configs/aa-bb-cc-dd-ee-ff.yaml
generatorOptions:
  disableNameSuffixHash: true
