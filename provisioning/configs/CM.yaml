cursive\n        grub_device: true\n\n      - id: part-efi\n        type: partition\n        device: disk-sda\n        size: 512M\n        flag: esp\n        grub_device: true\n\n      - id: part-boot\n        type: partition\n        device: disk-sda\n        size: 2G\n\n      - id: part-root-crypt\n        type: partition\n        device: disk-sda\n        size: -1\n\n      - id: fs-efi\n        type: format\n        volume: part-efi\n        fstype: fat32\n\n      - id: fs-boot\n        type: format\n        volume: part-boot\n        fstype: ext4\n\n      - id: luks-root\n        type: dm_crypt\n        volume: part-root-crypt\n        key: \"infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM\"\n        cipher: aes-xts-plain64\n        keysize: 512\n\n      - id: vg-system\n        type: lvm_volgroup\n        name: vg_system\n        devices:\n          - luks-root\n\n      - id: lv-root\n        type: lvm_partition\n        name: lv_root\n        volgroup: vg-system\n        size: 30G\n\n      - id: lv-varlog\n        type: lvm_partition\n        name: lv_varlog\n        volgroup: vg-system\n        size: 10G\n\n      - id: lv-tmp\n        type: lvm_partition\n        name: lv_tmp\n        volgroup: vg-system\n        size: 8G\n\n      - id: lv-vartmp\n        type: lvm_partition\n        name: lv_vartmp\n        volgroup: vg-system\n        size: 8G\n\n      - id: lv-home\n        type: lvm_partition\n        name: lv_home\n        volgroup: vg-system\n        size: 10G\n\n      - id: lv-swap\n        type: lvm_partition\n        name: lv_swap\n        volgroup: vg-system\n        size: 8G\n\n      - id: lv-var\n        type: lvm_partition\n        name: lv_var\n        volgroup: vg-system\n        size: -1\n\n      - id: fs-root\n        type: format\n        volume: lv-root\n        fstype: ext4\n\n      - id: fs-varlog\n        type: format\n        volume: lv-varlog\n        fstype: ext4\n\n      - id: fs-tmp\n        type: format\n        volume: lv-tmp\n        fstype: ext4\n\n      - id: fs-vartmp\n        type: format\n        volume: lv-vartmp\n        fstype: ext4\n\n      - id: fs-home\n        type: format\n        volume: lv-home\n        fstype: ext4\n\n      - id: fs-swap\n        type: format\n        volume: lv-swap\n        fstype: swap\n\n      - id: fs-var\n        type: format\n        volume: lv-var\n        fstype: ext4\n\n      - id: mnt-efi\n        type: mount\n        device: fs-efi\n        path: /boot/efi\n\n      - id: mnt-boot\n        type: mount\n        device: fs-boot\n        path: /boot\n\n      - id: mnt-root\n        type: mount\n        device: fs-root\n        path: /\n\n      - id: mnt-varlog\n        type: mount\n        device: fs-varlog\n        path: /var/log\n\n      - id: mnt-tmp\n        type: mount\n        device: fs-tmp\n        path: /tmp\n\n      - id: mnt-vartmp\n        type: mount\n        device: fs-vartmp\n        path: /var/tmp\n\n      - id: mnt-home\n        type: mount\n        device: fs-home\n        path: /home\n\n      - id: mnt-var\n        type: mount\n        device: fs-var\n        path: /var\n\n  late-commands:\n\n    # 1) Crear keyfile temporal dentro de /target\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      echo \"[INFO] Creando keyfile temporal para LUKS...\"\n      mkdir -p /etc/cryptsetup-keys.d\n      KEYFILE=\"/etc/cryptsetup-keys.d/root.key\"\n      printf \"%s\" \"infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM\" \u003e \"$KEYFILE\"\n      chmod 600 \"$KEYFILE\"\n      '\n\n    # 2) Añadir keyfile como slot adicional en el LUKS\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      echo \"[INFO] Añadiendo keyfile como slot temporal en LUKS...\"\n      cryptsetup luksAddKey /dev/sda3 /etc/cryptsetup-keys.d/root.key --key-file \u003c(printf \"%s\" \"infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM\")\n      '\n\n    # 3) Configurar crypttab para usar el keyfile y regenerar initramfs\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      echo \"[INFO] Configurando /etc/crypttab con keyfile...\"\n      UUID=$(blkid -s UUID -o value /dev/sda3)\n      echo \"luks-root UUID=$UUID /etc/cryptsetup-keys.d/root.key luks\" \u003e /etc/crypttab\n      update-initramfs -u -k all\n      '\n\n    # 4) Instalar clevis y herramientas TPM\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      export DEBIAN_FRONTEND=noninteractive\n      apt-get update\n      apt-get install -y clevis clevis-initramfs clevis-luks clevis-tpm2 tpm2-tools\n      '\n\n    # 5) Script de primer arranque: bind TPM + limpieza keyfile + regen initramfs\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      cat \u003e/usr/local/sbin/bind-luks-tpm.sh \u003c\u003c'\"'\"'EOF'\"'\"'\n      #!/bin/bash\n      set -euo pipefail\n\n      LUKS_DEV=\"/dev/sda3\"\n      KEYFILE=\"/etc/cryptsetup-keys.d/root.key\"\n      MARKER=\"/etc/clevis-tpm-bound\"\n      PASSPHRASE=\"infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM\"\n\n      echo \"[INFO] Inicio bind LUKS-\u003eTPM\"\n\n      if [ -f \"$MARKER\" ]; then\n        echo \"[INFO] Ya configurado anteriormente\"\n        exit 0\n      fi\n\n      if [ ! -e /dev/tpmrm0 ] \u0026\u0026 [ ! -e /dev/tpm0 ]; then\n        echo \"[INFO] No hay TPM disponible, se omite bind\"\n        touch \"$MARKER\"\n        exit 0\n      fi\n\n      if [ ! -b \"$LUKS_DEV\" ]; then\n        echo \"[ERROR] No existe el dispositivo LUKS\"\n        exit 1\n      fi\n\n      if ! cryptsetup isLuks \"$LUKS_DEV\"; then\n        echo \"[ERROR] El dispositivo indicado no es LUKS\"\n        exit 1\n      fi\n\n      if cryptsetup luksDump \"$LUKS_DEV\" | grep -qi clevis; then\n        echo \"[INFO] Ya existe token clevis en el volumen\"\n        touch \"$MARKER\"\n        update-initramfs -u -k all\n        exit 0\n      fi\n\n      echo \"[INFO] Realizando bind TPM2...\"\n      TMPKEY=$(mktemp)\n      trap 'rm -f \"$TMPKEY\"' EXIT\n\n      printf \"%s\" \"$PASSPHRASE\" \u003e \"$TMPKEY\"\n      chmod 600 \"$TMPKEY\"\n\n      tpm2_dictionarylockout --clear-lockout || true\n      clevis luks bind -y -k \"$TMPKEY\" -d \"$LUKS_DEV\" tpm2 \"{\\\"pcr_ids\\\":\\\"0,7\\\"}\"\n\n      echo \"[INFO] Eliminando keyfile temporal del LUKS (slot) y del disco...\"\n      cryptsetup luksRemoveKey \"$LUKS_DEV\" \"$KEYFILE\" || true\n      rm -f \"$KEYFILE\"\n\n      echo \"[INFO] Regenerando initramfs...\"\n      update-initramfs -u -k all\n\n      touch \"$MARKER\"\n      systemctl disable bind-luks-tpm.service || true\n\n      echo \"[INFO] Bind completado correctamente\"\n      EOF\n\n      chmod 0755 /usr/local/sbin/bind-luks-tpm.sh\n      '\n\n    # 6) Servicio systemd de primer arranque\n    - |\n      curtin in-target --target=/target -- /bin/bash -c '\n      cat \u003e/etc/systemd/system/bind-luks-tpm.service \u003c\u003c'\"'\"'EOF'\"'\"'\n      [Unit]\n      Description=Asociar LUKS root al TPM2 en el primer arranque\n      After=multi-user.target\n\n      [Service]\n      Type=oneshot\n      ExecStart=/usr/local/sbin/bind-luks-tpm.sh\n      RemainAfterExit=yes\n\n      [Install]\n      WantedBy=multi-user.target\n      EOF\n\n      systemctl enable bind-luks-tpm.service\n      '\n","02-network.yaml":"autoinstall:\n  version: 1\n\n  network:\n    version: 2\n\n    ethernets:\n      eth0:\n        dhcp4: true\n        dhcp6: false\n        optional: true\n","aa-bb-cc-dd-ee-ff.yaml":"autoinstall:\n  identity:\n    hostname: k3s-master\n","default.yaml":"autoinstall:\n  identity:\n    hostname: default-node\n"},"kind":"ConfigMap","metadata":{"annotations":{"argocd.argoproj.io/tracking-id":"provisioning:/ConfigMap:provisioning/provisioning-configs"},"name":"provisioning-configs","namespace":"provisioning"}}
