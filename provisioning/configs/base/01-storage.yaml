autoinstall:
  version: 1

  packages:
    - clevis
    - clevis-initramfs
    - clevis-luks
    - clevis-tpm2
    - tpm2-tools

  storage:
    config:
      - id: disk-sda
        type: disk
        path: /dev/sda
        ptable: gpt
        wipe: superblock-recursive
        grub_device: true

      - id: part-efi
        type: partition
        device: disk-sda
        size: 512M
        flag: esp
        grub_device: true

      - id: part-boot
        type: partition
        device: disk-sda
        size: 2G

      - id: part-root-crypt
        type: partition
        device: disk-sda
        size: -1

      - id: fs-efi
        type: format
        volume: part-efi
        fstype: fat32

      - id: fs-boot
        type: format
        volume: part-boot
        fstype: ext4

      - id: luks-root
        type: dm_crypt
        volume: part-root-crypt
        key: "infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM"
        cipher: aes-xts-plain64
        keysize: 512

      - id: vg-system
        type: lvm_volgroup
        name: vg_system
        devices:
          - luks-root

      - id: lv-root
        type: lvm_partition
        name: lv_root
        volgroup: vg-system
        size: 30G

      - id: lv-varlog
        type: lvm_partition
        name: lv_varlog
        volgroup: vg-system
        size: 10G

      - id: lv-tmp
        type: lvm_partition
        name: lv_tmp
        volgroup: vg-system
        size: 8G

      - id: lv-vartmp
        type: lvm_partition
        name: lv_vartmp
        volgroup: vg-system
        size: 8G

      - id: lv-home
        type: lvm_partition
        name: lv_home
        volgroup: vg-system
        size: 10G

      - id: lv-swap
        type: lvm_partition
        name: lv_swap
        volgroup: vg-system
        size: 8G

      - id: lv-var
        type: lvm_partition
        name: lv_var
        volgroup: vg-system
        size: -1

      - id: fs-root
        type: format
        volume: lv-root
        fstype: ext4

      - id: fs-varlog
        type: format
        volume: lv-varlog
        fstype: ext4

      - id: fs-tmp
        type: format
        volume: lv-tmp
        fstype: ext4

      - id: fs-vartmp
        type: format
        volume: lv-vartmp
        fstype: ext4

      - id: fs-home
        type: format
        volume: lv-home
        fstype: ext4

      - id: fs-swap
        type: format
        volume: lv-swap
        fstype: swap

      - id: fs-var
        type: format
        volume: lv-var
        fstype: ext4

      - id: mnt-efi
        type: mount
        device: fs-efi
        path: /boot/efi

      - id: mnt-boot
        type: mount
        device: fs-boot
        path: /boot

      - id: mnt-root
        type: mount
        device: fs-root
        path: /

      - id: mnt-varlog
        type: mount
        device: fs-varlog
        path: /var/log

      - id: mnt-tmp
        type: mount
        device: fs-tmp
        path: /tmp

      - id: mnt-vartmp
        type: mount
        device: fs-vartmp
        path: /var/tmp

      - id: mnt-home
        type: mount
        device: fs-home
        path: /home

      - id: mnt-var
        type: mount
        device: fs-var
        path: /var

  late-commands:
    # 1. Dejar crypttab bien y regenerar initramfs inicial
    - |
      curtin in-target --target=/target -- bash -c '
      UUID=$(blkid -s UUID -o value /dev/sda3)
      echo "luks-root UUID=$UUID none luks" > /etc/crypttab
      update-initramfs -u
      '

    # 2. Crear script de bind TPM para el primer arranque
    - |
      curtin in-target --target=/target -- bash -c "cat > /usr/local/sbin/bind-luks-tpm.sh << 'EOF'
      #!/bin/bash
      set -euo pipefail

      LUKS_DEV='/dev/sda3'
      PASSPHRASE='infra-k3s-A9kF3LmP8qZ2WxR7tYc6VbH4NdS1UoE5iTjK0QaM'
      MARKER='/etc/clevis-tpm-bound'

      echo '[INFO] Inicio bind LUKS->TPM'

      if [ -f \"\$MARKER\" ]; then
        echo '[INFO] Ya configurado anteriormente'
        exit 0
      fi

      if [ ! -e /dev/tpmrm0 ] && [ ! -e /dev/tpm0 ]; then
        echo '[INFO] No hay TPM disponible, se omite bind'
        exit 0
      fi

      if [ ! -b \"\$LUKS_DEV\" ]; then
        echo '[ERROR] No existe el dispositivo LUKS'
        exit 1
      fi

      if ! cryptsetup isLuks \"\$LUKS_DEV\"; then
        echo '[ERROR] El dispositivo indicado no es LUKS'
        exit 1
      fi

      if cryptsetup luksDump \"\$LUKS_DEV\" | grep -qi clevis; then
        echo '[INFO] Ya existe token clevis en el volumen'
        touch \"\$MARKER\"
        update-initramfs -u
        exit 0
      fi

      TMPKEY=\$(mktemp)
      trap 'rm -f \"\$TMPKEY\"' EXIT

      printf '%s' \"\$PASSPHRASE\" > \"\$TMPKEY\"
      chmod 600 \"\$TMPKEY\"

      echo '[INFO] Asociando LUKS al TPM2...'
      clevis luks bind -y -k \"\$TMPKEY\" -d \"\$LUKS_DEV\" tpm2 '{}'

      echo '[INFO] Regenerando initramfs...'
      update-initramfs -u

      touch \"\$MARKER\"
      systemctl disable bind-luks-tpm.service || true

      echo '[INFO] Bind completado correctamente'
      EOF
      chmod 0755 /usr/local/sbin/bind-luks-tpm.sh"

    # 3. Crear y habilitar servicio one-shot para primer arranque
    - |
      curtin in-target --target=/target -- bash -c "cat > /etc/systemd/system/bind-luks-tpm.service << 'EOF'
      [Unit]
      Description=Asociar LUKS root al TPM2 en el primer arranque
      After=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/bind-luks-tpm.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      EOF
      systemctl enable bind-luks-tpm.service"
