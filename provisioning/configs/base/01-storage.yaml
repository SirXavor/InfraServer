autoinstall:
  version: 1

  storage:
    config:
      - id: disk-sda
        type: disk
        path: /dev/sda
        ptable: gpt
        wipe: superblock-recursive
        grub_device: true

      - id: part-efi
        type: partition
        device: disk-sda
        size: 512M
        flag: esp
        grub_device: true

      - id: part-boot
        type: partition
        device: disk-sda
        size: 2G

      - id: part-root-crypt
        type: partition
        device: disk-sda
        size: -1

      - id: fs-efi
        type: format
        volume: part-efi
        fstype: fat32

      - id: fs-boot
        type: format
        volume: part-boot
        fstype: ext4

      - id: luks-root
        type: dm_crypt
        volume: part-root-crypt
        key: "InfraK3s-2026"
        cipher: aes-xts-plain64
        keysize: 512

      - id: vg-system
        type: lvm_volgroup
        name: vg_system
        devices:
          - luks-root

      - id: lv-root
        type: lvm_partition
        name: lv_root
        volgroup: vg-system
        size: 30G

      - id: lv-varlog
        type: lvm_partition
        name: lv_varlog
        volgroup: vg-system
        size: 10G

      - id: lv-tmp
        type: lvm_partition
        name: lv_tmp
        volgroup: vg-system
        size: 8G

      - id: lv-vartmp
        type: lvm_partition
        name: lv_vartmp
        volgroup: vg-system
        size: 8G

      - id: lv-home
        type: lvm_partition
        name: lv_home
        volgroup: vg-system
        size: 10G

      - id: lv-swap
        type: lvm_partition
        name: lv_swap
        volgroup: vg-system
        size: 8G

      - id: lv-var
        type: lvm_partition
        name: lv_var
        volgroup: vg-system
        size: -1

      - id: fs-root
        type: format
        volume: lv-root
        fstype: ext4

      - id: fs-varlog
        type: format
        volume: lv-varlog
        fstype: ext4

      - id: fs-tmp
        type: format
        volume: lv-tmp
        fstype: ext4

      - id: fs-vartmp
        type: format
        volume: lv-vartmp
        fstype: ext4

      - id: fs-home
        type: format
        volume: lv-home
        fstype: ext4

      - id: fs-swap
        type: format
        volume: lv-swap
        fstype: swap

      - id: fs-var
        type: format
        volume: lv-var
        fstype: ext4

      - id: mnt-efi
        type: mount
        device: fs-efi
        path: /boot/efi

      - id: mnt-boot
        type: mount
        device: fs-boot
        path: /boot

      - id: mnt-root
        type: mount
        device: fs-root
        path: /

      - id: mnt-varlog
        type: mount
        device: fs-varlog
        path: /var/log

      - id: mnt-tmp
        type: mount
        device: fs-tmp
        path: /tmp

      - id: mnt-vartmp
        type: mount
        device: fs-vartmp
        path: /var/tmp

      - id: mnt-home
        type: mount
        device: fs-home
        path: /home

      - id: mnt-var
        type: mount
        device: fs-var
        path: /var

  late-commands:
    - |
      curtin in-target --target=/target -- bash -c 'cat >/root/bind-tpm.sh << "EOF"
      #!/bin/bash
      set -euxo pipefail

      LOGFILE=/root/bind-tpm.log
      exec > >(tee -a "$LOGFILE") 2>&1

      echo "============================================================"
      echo "[INFO] Inicio de bind-tpm.sh"
      date
      echo "============================================================"

      export DEBIAN_FRONTEND=noninteractive

      echo "[INFO] Variables de entorno básicas"
      uname -a || true
      cat /etc/os-release || true

      echo "[INFO] Estado de discos antes de nada"
      lsblk || true
      blkid || true

      echo "[INFO] Instalando dracut + clevis + tpm2-tools..."
      apt-get update
      apt-get install -y \
        dracut \
        clevis \
        clevis-luks \
        clevis-tpm2 \
        clevis-dracut \
        tpm2-tools \
        cryptsetup \
        cryptsetup-initramfs \
        lvm2 \
        jq

      echo "[INFO] Comprobando existencia de /dev/sda3"
      ls -l /dev/sda3

      echo "[INFO] Verificando que /dev/sda3 es LUKS"
      cryptsetup isLuks /dev/sda3

      echo "[INFO] Dump LUKS inicial"
      cryptsetup luksDump /dev/sda3 || true

      echo "[INFO] Comprobando dispositivos TPM"
      ls -l /dev/tpm* || true

      echo "[INFO] Información TPM básica"
      tpm2_getcap properties-fixed || true
      tpm2_getcap properties-variable || true

      echo "[INFO] Limpiando posible lockout del TPM"
      tpm2_dictionarylockout --clear-lockout || true

      TMPKEY=$(mktemp)
      trap '\''rm -f "$TMPKEY"'\'' EXIT

      printf "%s" "InfraK3s-2026" > "$TMPKEY"
      chmod 600 "$TMPKEY"

      echo "[INFO] Comprobando slots antes del bind"
      cryptsetup luksDump /dev/sda3 | sed -n "/Keyslots:/,/Tokens:/p" || true

      echo "[INFO] Asociando LUKS con SSS: TPM2 o Tang"
      clevis luks bind -y -k "$TMPKEY" -d /dev/sda3 sss '\''{
        "t": 1,
        "pins": {
          "tpm2": {},
          "tang": {
            "url": "http://192.168.1.70:8082"
          }
        }
      }'\''

      echo "[INFO] Configurando red en initramfs para Tang"
      mkdir -p /etc/dracut.conf.d
      cat >/etc/dracut.conf.d/10-network.conf <<DRACUTEOF
      hostonly="yes"
      hostonly_cmdline="yes"
      kernel_cmdline+=" rd.neednet=1 "
      DRACUTEOF

      echo "[INFO] Tokens después del bind"
      clevis luks list -d /dev/sda3 || true
      cryptsetup luksDump /dev/sda3 || true

      echo "[INFO] Comprobando crypttab"
      cat /etc/crypttab || true

      echo "[INFO] Generando initramfs con dracut"
      dracut -f -v

      echo "[INFO] Listado de /boot"
      ls -lah /boot || true

      echo "[INFO] Buscando clevis dentro del initramfs generado"
      KVER=$(uname -r)
      if [ -f "/boot/initrd.img-$KVER" ]; then
        lsinitramfs "/boot/initrd.img-$KVER" | grep -Ei "clevis|crypt|dracut|network" || true
      else
        echo "[WARN] No existe /boot/initrd.img-$KVER"
        ls -lah /boot || true
      fi

      echo "[INFO] Fin correcto de bind-tpm.sh"
      date
      EOF
      chmod 700 /root/bind-tpm.sh'

    - |
      curtin in-target --target=/target -- bash -c '/root/bind-tpm.sh || (echo "[ERROR] Falló /root/bind-tpm.sh"; cat /root/bind-tpm.log || true; exit 1)'
