  late-commands:
    - |
      curtin in-target --target=/target -- bash -c 'cat >/root/setup-luks-unlock.sh << "EOF"
      #!/bin/bash
      set -euxo pipefail

      LOGFILE=/root/setup-luks-unlock.log
      exec > >(tee -a "$LOGFILE") 2>&1

      LUKS_DEV="/dev/sda3"
      PASSPHRASE="InfraK3s-2026"
      TANG_URL="http://192.168.1.70:8082"

      echo "============================================================"
      echo "[INFO] Inicio de setup-luks-unlock.sh"
      date
      echo "============================================================"

      export DEBIAN_FRONTEND=noninteractive

      echo "[INFO] Instalando paquetes necesarios"
      apt-get update
      apt-get install -y \
        dracut \
        clevis \
        clevis-luks \
        clevis-tpm2 \
        clevis-dracut \
        tpm2-tools \
        cryptsetup \
        cryptsetup-initramfs \
        lvm2 \
        jq

      echo "[INFO] Comprobando dispositivo LUKS"
      ls -l "$LUKS_DEV"
      cryptsetup isLuks "$LUKS_DEV"

      TMPKEY=$(mktemp)
      trap '\''rm -f "$TMPKEY"'\'' EXIT
      printf "%s" "$PASSPHRASE" > "$TMPKEY"
      chmod 600 "$TMPKEY"

      echo "[INFO] Comprobando tokens existentes"
      clevis luks list -d "$LUKS_DEV" || true
      cryptsetup luksDump "$LUKS_DEV" || true

      echo "[INFO] Asegurando bind Tang para primer arranque"
      if clevis luks list -d "$LUKS_DEV" 2>/dev/null | grep -qi tang; then
        echo "[INFO] Ya existe token Tang"
      else
        clevis luks bind -y -k "$TMPKEY" -d "$LUKS_DEV" tang "{\"url\":\"$TANG_URL\"}"
      fi

      echo "[INFO] Configurando red en initramfs para Tang"
      mkdir -p /etc/dracut.conf.d
      cat >/etc/dracut.conf.d/10-network.conf <<DRACUTEOF
      hostonly="yes"
      hostonly_cmdline="yes"
      kernel_cmdline+=" rd.neednet=1 "
      DRACUTEOF

      echo "[INFO] Detectando kernel instalado"
      KVER=$(ls /lib/modules | sort | tail -n1)
      echo "[INFO] Kernel detectado: $KVER"

      echo "[INFO] Generando initramfs con dracut"
      dracut -f -v "/boot/initrd.img-$KVER" "$KVER"

      echo "[INFO] Creando script de mantenimiento TPM"
      cat >/usr/local/sbin/bind-luks-tpm.sh <<TPMEOF
      #!/bin/bash
      set -euo pipefail

      LOGFILE=/root/bind-luks-tpm.log
      exec > >(tee -a "\$LOGFILE") 2>&1

      LUKS_DEV="/dev/sda3"
      PASSPHRASE="InfraK3s-2026"

      echo "============================================================"
      echo "[INFO] Inicio de bind-luks-tpm.sh"
      date
      echo "============================================================"

      if [ ! -b "\$LUKS_DEV" ]; then
        echo "[ERROR] No existe \$LUKS_DEV"
        exit 1
      fi

      if ! cryptsetup isLuks "\$LUKS_DEV"; then
        echo "[ERROR] \$LUKS_DEV no es un dispositivo LUKS"
        exit 1
      fi

      if [ ! -e /dev/tpmrm0 ] && [ ! -e /dev/tpm0 ]; then
        echo "[INFO] No hay TPM disponible; se mantiene Tang como método de desbloqueo"
        exit 0
      fi

      echo "[INFO] Comprobando tokens actuales"
      clevis luks list -d "\$LUKS_DEV" || true

      if clevis luks list -d "\$LUKS_DEV" 2>/dev/null | grep -qi tpm2; then
        echo "[INFO] Ya existe token TPM2; no se hace nada"
        exit 0
      fi

      TMPKEY=\$(mktemp)
      trap '\''rm -f "\$TMPKEY"'\'' EXIT
      printf "%s" "\$PASSPHRASE" > "\$TMPKEY"
      chmod 600 "\$TMPKEY"

      echo "[INFO] Limpiando posible lockout TPM"
      tpm2_dictionarylockout --clear-lockout || true

      echo "[INFO] Asociando LUKS al TPM2 en el sistema real"
      clevis luks bind -y -k "\$TMPKEY" -d "\$LUKS_DEV" tpm2 "{}"

      echo "[INFO] Regenerando initramfs tras bind TPM"
      KVER=\$(ls /lib/modules | sort | tail -n1)
      dracut -f -v "/boot/initrd.img-\$KVER" "\$KVER"

      echo "[INFO] Tokens finales"
      clevis luks list -d "\$LUKS_DEV" || true
      cryptsetup luksDump "\$LUKS_DEV" || true

      echo "[INFO] Fin correcto de bind-luks-tpm.sh"
      date
      TPMEOF

      chmod 0755 /usr/local/sbin/bind-luks-tpm.sh

      echo "[INFO] Creando servicio systemd persistente"
      printf "%s\n" \
        "[Unit]" \
        "Description=Mantenimiento del bind TPM2 para LUKS root" \
        "After=network-online.target multi-user.target" \
        "Wants=network-online.target" \
        "" \
        "[Service]" \
        "Type=oneshot" \
        "ExecStart=/usr/local/sbin/bind-luks-tpm.sh" \
        "RemainAfterExit=yes" \
        "" \
        "[Install]" \
        "WantedBy=multi-user.target" \
        > /etc/systemd/system/bind-luks-tpm.service

      systemctl daemon-reload
      systemctl enable bind-luks-tpm.service

      echo "[INFO] Estado final"
      cat /etc/crypttab || true
      ls -lah /boot || true
      clevis luks list -d "$LUKS_DEV" || true

      echo "[INFO] Fin correcto de setup-luks-unlock.sh"
      date
      EOF
      chmod 700 /root/setup-luks-unlock.sh'

    - |
      curtin in-target --target=/target -- bash -c '/root/setup-luks-unlock.sh || (echo "[ERROR] Falló /root/setup-luks-unlock.sh"; cat /root/setup-luks-unlock.log || true; exit 1)'