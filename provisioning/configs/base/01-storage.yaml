autoinstall:
  version: 1

  storage:
    config:
      - id: disk-sda
        type: disk
        path: /dev/sda
        ptable: gpt
        wipe: superblock-recursive
        grub_device: true

      - id: part-efi
        type: partition
        device: disk-sda
        size: 512M
        flag: esp
        grub_device: true

      - id: part-boot
        type: partition
        device: disk-sda
        size: 2G

      - id: part-root-crypt
        type: partition
        device: disk-sda
        size: -1

      - id: fs-efi
        type: format
        volume: part-efi
        fstype: fat32

      - id: fs-boot
        type: format
        volume: part-boot
        fstype: ext4

      - id: luks-root
        type: dm_crypt
        volume: part-root-crypt
        key: "InfraK3s-2026"
        cipher: aes-xts-plain64
        keysize: 512

      - id: vg-system
        type: lvm_volgroup
        name: vg_system
        devices:
          - luks-root

      - id: lv-root
        type: lvm_partition
        name: lv_root
        volgroup: vg-system
        size: 30G

      - id: lv-varlog
        type: lvm_partition
        name: lv_varlog
        volgroup: vg-system
        size: 10G

      - id: lv-tmp
        type: lvm_partition
        name: lv_tmp
        volgroup: vg-system
        size: 8G

      - id: lv-vartmp
        type: lvm_partition
        name: lv_vartmp
        volgroup: vg-system
        size: 8G

      - id: lv-home
        type: lvm_partition
        name: lv_home
        volgroup: vg-system
        size: 10G

      - id: lv-swap
        type: lvm_partition
        name: lv_swap
        volgroup: vg-system
        size: 8G

      - id: lv-var
        type: lvm_partition
        name: lv_var
        volgroup: vg-system
        size: -1

      - id: fs-root
        type: format
        volume: lv-root
        fstype: ext4

      - id: fs-varlog
        type: format
        volume: lv-varlog
        fstype: ext4

      - id: fs-tmp
        type: format
        volume: lv-tmp
        fstype: ext4

      - id: fs-vartmp
        type: format
        volume: lv-vartmp
        fstype: ext4

      - id: fs-home
        type: format
        volume: lv-home
        fstype: ext4

      - id: fs-swap
        type: format
        volume: lv-swap
        fstype: swap

      - id: fs-var
        type: format
        volume: lv-var
        fstype: ext4

      - id: mnt-efi
        type: mount
        device: fs-efi
        path: /boot/efi

      - id: mnt-boot
        type: mount
        device: fs-boot
        path: /boot

      - id: mnt-root
        type: mount
        device: fs-root
        path: /

      - id: mnt-varlog
        type: mount
        device: fs-varlog
        path: /var/log

      - id: mnt-tmp
        type: mount
        device: fs-tmp
        path: /tmp

      - id: mnt-vartmp
        type: mount
        device: fs-vartmp
        path: /var/tmp

      - id: mnt-home
        type: mount
        device: fs-home
        path: /home

      - id: mnt-var
        type: mount
        device: fs-var
        path: /var

  late-commands:
      - |
        curtin in-target --target=/target -- bash -c 'cat >/root/setup-luks-unlock.sh << "EOF"
        #!/bin/bash
        set -euxo pipefail

        LOGFILE=/root/setup-luks-unlock.log
        exec > >(tee -a "$LOGFILE") 2>&1

        LUKS_DEV="/dev/sda3"
        PASSPHRASE="InfraK3s-2026"
        TANG_URL="http://192.168.1.70:8082"

        echo "============================================================"
        echo "[INFO] Inicio de setup-luks-unlock.sh"
        date
        echo "============================================================"

        export DEBIAN_FRONTEND=noninteractive

        echo "[INFO] Instalando paquetes necesarios"
        apt-get update
        apt-get install -y \
          dracut \
          clevis \
          clevis-luks \
          clevis-tpm2 \
          clevis-dracut \
          tpm2-tools \
          cryptsetup \
          cryptsetup-initramfs \
          lvm2 \
          jq

        echo "[INFO] Comprobando dispositivo LUKS"
        ls -l "$LUKS_DEV"
        cryptsetup isLuks "$LUKS_DEV"

        TMPKEY=$(mktemp)
        trap '\''rm -f "$TMPKEY"'\'' EXIT
        printf "%s" "$PASSPHRASE" > "$TMPKEY"
        chmod 600 "$TMPKEY"

        echo "[INFO] Comprobando tokens existentes"
        clevis luks list -d "$LUKS_DEV" || true
        cryptsetup luksDump "$LUKS_DEV" || true

        echo "[INFO] Asegurando bind Tang para primer arranque"
        if clevis luks list -d "$LUKS_DEV" 2>/dev/null | grep -qi tang; then
          echo "[INFO] Ya existe token Tang"
        else
          clevis luks bind -y -k "$TMPKEY" -d "$LUKS_DEV" tang "{\"url\":\"$TANG_URL\"}"
        fi

        echo "[INFO] Configurando red en initramfs para Tang"
        mkdir -p /etc/dracut.conf.d
        cat >/etc/dracut.conf.d/10-network.conf <<DRACUTEOF
        hostonly="yes"
        hostonly_cmdline="yes"
        kernel_cmdline+=" rd.neednet=1 ip=dhcp "
        DRACUTEOF

        echo "[INFO] Detectando kernel instalado"
        KVER=$(ls /lib/modules | sort | tail -n1)
        echo "[INFO] Kernel detectado: $KVER"

        echo "[INFO] Generando initramfs con dracut"
        dracut -f -v "/boot/initrd.img-$KVER" "$KVER"

        echo "[INFO] Creando script de bind TPM post-arranque"
        cat >/usr/local/sbin/bind-luks-tpm.sh <<TPMEOF
        #!/bin/bash
        set -euo pipefail

        LOGFILE=/root/bind-luks-tpm.log
        exec > >(tee -a "\$LOGFILE") 2>&1

        LUKS_DEV="/dev/sda3"
        PASSPHRASE="InfraK3s-2026"
        MARKER="/etc/clevis-tpm-bound"

        echo "========================================"
        echo "[INFO] Inicio bind-luks-tpm.sh"
        date
        echo "========================================"

        if [ -f "\$MARKER" ]; then
          echo "[INFO] TPM ya configurado, saliendo"
          exit 0
        fi

        if [ ! -e /dev/tpmrm0 ] && [ ! -e /dev/tpm0 ]; then
          echo "[WARN] No hay TPM disponible, se mantiene Tang como único método"
          exit 0
        fi

        if ! cryptsetup isLuks "\$LUKS_DEV"; then
          echo "[ERROR] \$LUKS_DEV no es LUKS"
          exit 1
        fi

        if clevis luks list -d "\$LUKS_DEV" 2>/dev/null | grep -qi tpm2; then
          echo "[INFO] Token TPM2 ya presente"
          touch "\$MARKER"
          exit 0
        fi

        TMPKEY=\$(mktemp)
        trap 'rm -f "\$TMPKEY"' EXIT
        printf "%s" "\$PASSPHRASE" > "\$TMPKEY"
        chmod 600 "\$TMPKEY"

        echo "[INFO] Limpiando lockout TPM"
        tpm2_dictionarylockout --clear-lockout || true

        echo "[INFO] Bind LUKS -> TPM2 (PCR 7)"
        clevis luks bind -y -k "\$TMPKEY" -d "\$LUKS_DEV" tpm2 '{"pcr_ids":"7"}'

        echo "[INFO] Tokens activos tras bind:"
        clevis luks list -d "\$LUKS_DEV"

        echo "[INFO] Regenerando initramfs"
        KVER=\$(ls /lib/modules | sort | tail -n1)
        dracut -f "/boot/initrd.img-\$KVER" "\$KVER"

        touch "\$MARKER"
        systemctl disable bind-luks-tpm.service || true

        echo "[INFO] Bind TPM completado. Tokens finales:"
        clevis luks list -d "\$LUKS_DEV"
        date
        TPMEOF

        chmod 0755 /usr/local/sbin/bind-luks-tpm.sh

        echo "[INFO] Creando servicio systemd bind-luks-tpm"
        cat >/etc/systemd/system/bind-luks-tpm.service <<SVCEOF
        [Unit]
        Description=Bind LUKS root al TPM2 tras primer arranque con Tang
        After=network-online.target multi-user.target
        Wants=network-online.target
        ConditionPathExists=!/etc/clevis-tpm-bound

        [Service]
        Type=oneshot
        ExecStart=/usr/local/sbin/bind-luks-tpm.sh
        RemainAfterExit=yes
        StandardOutput=journal
        StandardError=journal

        [Install]
        WantedBy=multi-user.target
        SVCEOF

        systemctl daemon-reload
        systemctl enable bind-luks-tpm.service

        echo "[INFO] Estado final"
        cat /etc/crypttab || true
        ls -lah /boot || true
        clevis luks list -d "$LUKS_DEV" || true

        echo "[INFO] Fin correcto de setup-luks-unlock.sh"
        date
        EOF
        chmod 700 /root/setup-luks-unlock.sh'

      - |
        curtin in-target --target=/target -- bash -c '/root/setup-luks-unlock.sh || (echo "[ERROR] Falló setup-luks-unlock.sh"; cat /root/setup-luks-unlock.log || true; exit 1)'