apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ingress-nginx.yaml
  - root.yaml
  - apps/provisioning.yaml
  - apps/coredns.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 8.0.0
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
    includeCRDs: true
